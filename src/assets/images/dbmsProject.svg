<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#171225"/>
    </linearGradient>
    <linearGradient id="cylGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad2)"/>
  <rect width="800" height="450" fill="url(#glow2)"/>

  <!-- faint schema grid lines -->
  <g stroke="#332a52" stroke-width="1.5" opacity="0.5">
    <line x1="60" y1="60" x2="60" y2="390"/>
    <line x1="740" y1="60" x2="740" y2="390"/>
    <path d="M60 100 H140" fill="none"/>
    <path d="M740 130 H660" fill="none"/>
    <path d="M60 330 H150" fill="none"/>
    <path d="M740 300 H650" fill="none"/>
  </g>

  <!-- three stacked cylinders (tables) -->
  <g transform="translate(400,90)">
    <g transform="translate(-150,0)">
      <ellipse cx="0" cy="0" rx="46" ry="14" fill="url(#cylGrad)" opacity="0.9"/>
      <rect x="-46" y="0" width="92" height="50" fill="url(#cylGrad)" opacity="0.35"/>
      <ellipse cx="0" cy="50" rx="46" ry="14" fill="none" stroke="url(#cylGrad)" stroke-width="2"/>
      <line x1="-46" y1="0" x2="-46" y2="50" stroke="url(#cylGrad)" stroke-width="2"/>
      <line x1="46" y1="0" x2="46" y2="50" stroke="url(#cylGrad)" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="46" ry="14" fill="none" stroke="url(#cylGrad)" stroke-width="2"/>
    </g>
    <g transform="translate(0,-30)">
      <ellipse cx="0" cy="0" rx="58" ry="17" fill="url(#cylGrad)"/>
      <rect x="-58" y="0" width="116" height="140" fill="url(#cylGrad)" opacity="0.35"/>
      <ellipse cx="0" cy="140" rx="58" ry="17" fill="none" stroke="url(#cylGrad)" stroke-width="2.5"/>
      <line x1="-58" y1="0" x2="-58" y2="140" stroke="url(#cylGrad)" stroke-width="2.5"/>
      <line x1="58" y1="0" x2="58" y2="140" stroke="url(#cylGrad)" stroke-width="2.5"/>
      <ellipse cx="0" cy="0" rx="58" ry="17" fill="none" stroke="url(#cylGrad)" stroke-width="2.5"/>
      <line x1="-58" y1="45" x2="58" y2="45" stroke="#0b1220" stroke-width="1.5" opacity="0.6"/>
      <line x1="-58" y1="90" x2="58" y2="90" stroke="#0b1220" stroke-width="1.5" opacity="0.6"/>
    </g>
    <g transform="translate(150,10)">
      <ellipse cx="0" cy="0" rx="46" ry="14" fill="url(#cylGrad)" opacity="0.9"/>
      <rect x="-46" y="0" width="92" height="60" fill="url(#cylGrad)" opacity="0.35"/>
      <ellipse cx="0" cy="60" rx="46" ry="14" fill="none" stroke="url(#cylGrad)" stroke-width="2"/>
      <line x1="-46" y1="0" x2="-46" y2="60" stroke="url(#cylGrad)" stroke-width="2"/>
      <line x1="46" y1="0" x2="46" y2="60" stroke="url(#cylGrad)" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="46" ry="14" fill="none" stroke="url(#cylGrad)" stroke-width="2"/>
    </g>
    <!-- connecting relation lines -->
    <line x1="-104" y1="20" x2="-58" y2="45" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>
    <line x1="104" y1="35" x2="58" y2="60" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>
  </g>

  <!-- title -->
  <text x="400" y="365" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#f1f5f9">Database Management System</text>
  <text x="400" y="396" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#a598c9" letter-spacing="1.5">MYSQL · SQLALCHEMY · SCHEMA DESIGN</text>
</svg>
